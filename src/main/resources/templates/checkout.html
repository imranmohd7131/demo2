<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Checkout – Lakshmi Jewellers</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lato:wght@300;400;600&display=swap" rel="stylesheet"/>
    <style>
        :root { --gold:#c9a84c; --dark:#1a0f00; --brown:#3a2a1a; --cream:#fdf8f0; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Lato',sans-serif; background:var(--cream); color:var(--brown); }
        header { background:var(--dark); color:var(--gold); padding:18px 40px; display:flex; align-items:center; gap:12px; }
        header a { color:var(--gold); text-decoration:none; font-size:0.9rem; }
        header h1 { font-family:'Playfair Display',serif; font-size:1.4rem; }
        .container { max-width:960px; margin:40px auto; padding:0 20px; display:grid; grid-template-columns:1fr 1fr; gap:32px; }
        @media(max-width:700px){ .container{ grid-template-columns:1fr; } }
        .card { background:white; border-radius:16px; padding:28px; box-shadow:0 2px 16px rgba(0,0,0,0.07); }
        h2 { font-family:'Playfair Display',serif; font-size:1.3rem; margin-bottom:20px; color:var(--brown); }
        .order-item { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #f0e8d0; font-size:0.9rem; }
        .order-item:last-child { border:none; }
        .total-row { display:flex; justify-content:space-between; font-weight:700; font-size:1.1rem; margin-top:16px; color:var(--dark); }
        label { display:block; font-size:0.85rem; font-weight:600; margin-bottom:6px; margin-top:16px; color:#555; }
        input[type=text], input[type=tel], textarea {
            width:100%; padding:11px 14px; border:1.5px solid #ddd; border-radius:10px;
            font-size:0.95rem; font-family:'Lato',sans-serif; outline:none; transition:border-color 0.2s;
        }
        input:focus, textarea:focus { border-color:var(--gold); }
        textarea { resize:vertical; min-height:80px; }
        .payment-options { display:flex; gap:12px; margin-top:8px; flex-wrap:wrap; }
        .pay-opt { flex:1; min-width:120px; border:2px solid #ddd; border-radius:12px; padding:14px; text-align:center; cursor:pointer; transition:all 0.2s; }
        .pay-opt:hover { border-color:var(--gold); }
        .pay-opt input { display:none; }
        .pay-opt.selected { border-color:var(--gold); background:#fffbf0; }
        .pay-opt .icon { font-size:1.8rem; margin-bottom:4px; }
        .pay-opt span { font-size:0.82rem; font-weight:600; display:block; }
        .error-box { background:#fff0f0; border:1px solid #f44336; color:#c62828; padding:12px 16px; border-radius:10px; margin-bottom:16px; font-size:0.9rem; }
        .btn-place { width:100%; padding:15px; background:var(--gold); color:var(--dark); border:none; border-radius:30px; font-size:1rem; font-weight:700; cursor:pointer; margin-top:24px; transition:opacity 0.2s; }
        .btn-place:hover { opacity:0.88; }
        .secure { text-align:center; font-size:0.78rem; color:#aaa; margin-top:10px; }
    </style>
</head>
<body>
<header>
    <a href="/">← Back to Shop</a>
    <h1 style="margin-left:auto;margin-right:auto;">💍 Checkout</h1>
</header>
<div class="container">
    <!-- Order Summary -->
    <div class="card">
        <h2>Order Summary</h2>
        <div th:each="item : ${items}" class="order-item">
            <span th:text="${item.name} + ' × ' + ${item.qty}"></span>
            <span th:text="${item.price}"></span>
        </div>
        <div class="total-row">
            <span>Total</span>
            <span th:text="${total}"></span>
        </div>
    </div>

    <!-- Checkout Form -->
    <div class="card">
        <h2>Your Details</h2>
        <div th:if="${error}" class="error-box">⚠️ <span th:text="${error}"></span></div>
        <form method="post" action="/initiate-payment" id="checkoutForm">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="Your name" required/>
            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="+91 XXXXX XXXXX" required/>
            <label>Delivery Address</label>
            <textarea name="address" placeholder="House no, Street, City, Pincode" required></textarea>
            <button type="submit" class="btn-place">🔒 Proceed to Payment</button>
            <p class="secure">🔐 Powered by Razorpay — GPay, UPI, Cards &amp; more</p>
        </form>
    </div>
</div>
</body>
</html>
