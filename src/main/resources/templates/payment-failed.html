<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Payment Failed</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lato:wght@400;600&display=swap" rel="stylesheet"/>
    <style>
        :root { --gold:#c9a84c; --dark:#1a0f00; --brown:#3a2a1a; --cream:#fdf8f0; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Lato',sans-serif; background:var(--cream); display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .card { background:white; border-radius:20px; padding:40px; max-width:420px; width:100%; box-shadow:0 4px 30px rgba(0,0,0,0.1); text-align:center; }
        .icon { font-size:3.5rem; margin-bottom:16px; }
        h1 { font-family:'Playfair Display',serif; font-size:1.6rem; color:#c62828; margin-bottom:10px; }
        p { color:#888; font-size:0.9rem; margin-bottom:24px; }
        .error-msg { background:#fff0f0; border:1px solid #f44336; color:#c62828; padding:12px; border-radius:10px; margin-bottom:20px; font-size:0.88rem; }
        .btn { display:inline-block; padding:12px 28px; background:var(--gold); color:var(--dark); border-radius:30px; text-decoration:none; font-weight:700; margin:6px; }
        .btn-outline { background:transparent; border:2px solid var(--gold); color:var(--brown); }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">❌</div>
    <h1>Payment Failed</h1>
    <div class="error-msg" th:if="${error}" th:text="${error}"></div>
    <p>Don't worry — your cart is still saved. You can try again.</p>
    <a href="/checkout" class="btn">Try Again</a>
    <a href="/" class="btn btn-outline">Back to Shop</a>
</div>
</body>
</html>
