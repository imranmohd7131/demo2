<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Track Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lato:wght@400;600&display=swap" rel="stylesheet"/>
    <style>
        :root { --gold:#c9a84c; --dark:#1a0f00; --brown:#3a2a1a; --cream:#fdf8f0; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Lato',sans-serif; background:var(--cream); color:var(--brown); padding:40px 20px; }
        .card { background:white; border-radius:20px; padding:36px; max-width:560px; margin:0 auto; box-shadow:0 4px 24px rgba(0,0,0,0.08); }
        h1 { font-family:'Playfair Display',serif; font-size:1.6rem; margin-bottom:6px; }
        .order-id { color:var(--gold); font-weight:700; font-size:0.95rem; margin-bottom:20px; display:block; }
        .timeline { position:relative; padding-left:40px; margin:24px 0; }
        .timeline::before { content:''; position:absolute; left:14px; top:0; bottom:0; width:2px; background:#e0d0a0; }
        .tl-item { position:relative; margin-bottom:28px; }
        .tl-dot {
            position:absolute; left:-40px; top:2px;
            width:28px; height:28px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-size:0.9rem; border:2px solid #e0d0a0; background:white;
        }
        .tl-dot.done { background:var(--gold); border-color:var(--gold); }
        .tl-dot.active { background:var(--dark); border-color:var(--dark); animation:pulse 1.2s infinite; }
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0.4)} 50%{box-shadow:0 0 0 8px rgba(201,168,76,0)} }
        .tl-label { font-weight:600; font-size:0.95rem; }
        .tl-sub { font-size:0.8rem; color:#aaa; margin-top:2px; }
        .tl-item.done .tl-label { color:var(--dark); }
        .tl-item.pending .tl-label { color:#bbb; }
        .info { background:#fdf8f0; border-radius:12px; padding:16px; font-size:0.88rem; margin-top:16px; }
        .info p { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #f0e8d0; }
        .info p:last-child { border:none; }
        .info span { font-weight:600; }
        .btn-back { display:inline-block; margin-top:20px; padding:11px 28px; background:var(--dark); color:var(--gold); border-radius:30px; text-decoration:none; font-size:0.9rem; font-weight:600; }
    </style>
</head>
<body>
<div class="card">
    <h1>📦 Track Your Order</h1>
    <span class="order-id" th:text="${order.id}"></span>

    <div th:with="status=${order.orderStatus}">
        <div class="timeline">
            <div th:classappend="${status == 'NEW' ? 'active' : (status != 'NEW' ? 'done' : 'pending')}" class="tl-item">
                <div th:classappend="${status != 'NEW' ? 'done' : 'active'}" class="tl-dot">✓</div>
                <div class="tl-label">Order Placed</div>
                <div class="tl-sub" th:text="${order.createdAt}"></div>
            </div>
            <div th:classappend="${status == 'PREPARING' ? 'active' : (status == 'OUT_FOR_DELIVERY' or status == 'DELIVERED' ? 'done' : 'pending')}" class="tl-item">
                <div th:classappend="${status == 'PREPARING' ? 'active' : (status == 'OUT_FOR_DELIVERY' or status == 'DELIVERED' ? 'done' : '')}" class="tl-dot">🍳</div>
                <div class="tl-label">Shop is Preparing</div>
                <div class="tl-sub">Your jewellery is being packed</div>
            </div>
            <div th:classappend="${status == 'OUT_FOR_DELIVERY' ? 'active' : (status == 'DELIVERED' ? 'done' : 'pending')}" class="tl-item">
                <div th:classappend="${status == 'OUT_FOR_DELIVERY' ? 'active' : (status == 'DELIVERED' ? 'done' : '')}" class="tl-dot">🚚</div>
                <div class="tl-label">Out for Delivery</div>
                <div class="tl-sub">On the way to your address</div>
            </div>
            <div th:classappend="${status == 'DELIVERED' ? 'done' : 'pending'}" class="tl-item">
                <div th:classappend="${status == 'DELIVERED' ? 'done' : ''}" class="tl-dot">🏠</div>
                <div class="tl-label">Delivered</div>
                <div class="tl-sub">Enjoy your jewellery!</div>
            </div>
        </div>
    </div>

    <div class="info">
        <p><span>Customer</span><span th:text="${order.customerName}"></span></p>
        <p><span>Phone</span><span th:text="${order.phone}"></span></p>
        <p><span>Address</span><span th:text="${order.address}"></span></p>
        <p><span>Payment</span><span th:text="${order.paymentMethod}"></span></p>
        <p><span>Total</span><span th:text="'₹' + ${order.total}"></span></p>
    </div>

    <a href="/" class="btn-back">← Back to Shop</a>
</div>
</body>
</html>
