<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Payment – Lakshmi Jewellers</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lato:wght@400;600&display=swap" rel="stylesheet"/>
    <style>
        :root { --gold:#c9a84c; --dark:#1a0f00; --brown:#3a2a1a; --cream:#fdf8f0; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Lato',sans-serif; background:var(--cream); display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .card { background:white; border-radius:20px; padding:40px; max-width:420px; width:100%; box-shadow:0 4px 30px rgba(0,0,0,0.1); text-align:center; }
        .logo { font-size:2.5rem; margin-bottom:12px; }
        h1 { font-family:'Playfair Display',serif; font-size:1.5rem; color:var(--dark); margin-bottom:6px; }
        .amount { font-size:2rem; font-family:'Playfair Display',serif; color:var(--gold); margin:16px 0; }
        p { color:#888; font-size:0.9rem; margin-bottom:24px; }
        .btn-pay { width:100%; padding:15px; background:var(--gold); color:var(--dark); border:none; border-radius:30px; font-size:1rem; font-weight:700; cursor:pointer; transition:opacity 0.2s; }
        .btn-pay:hover { opacity:0.88; }
        .secure { font-size:0.75rem; color:#bbb; margin-top:12px; }
        .methods { display:flex; justify-content:center; gap:12px; margin:16px 0; font-size:1.6rem; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">💍</div>
    <h1>Lakshmi Jewellers</h1>
    <p>Hello <strong th:text="${customerName}"></strong>, complete your payment</p>
    <div class="amount" th:text="${total}"></div>
    <div class="methods">📱 💳 🏦 💵</div>
    <p>GPay · UPI · Net Banking · Cards</p>
    <button class="btn-pay" id="payBtn">Pay Now</button>
    <p class="secure">🔐 Secured by Razorpay</p>
</div>

<!-- Hidden form to submit payment result back to server -->
<form id="paymentResult" method="post" action="/verify-payment" style="display:none">
    <input type="hidden" name="razorpay_order_id"  id="rzp_order_id"/>
    <input type="hidden" name="razorpay_payment_id" id="rzp_payment_id"/>
    <input type="hidden" name="razorpay_signature"  id="rzp_signature"/>
    <input type="hidden" name="payment_method"      id="rzp_method"/>
</form>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script th:inline="javascript">
    const options = {
        key:         /*[[${razorpayKeyId}]]*/ '',
        amount:      /*[[${amount}]]*/ 0,
        currency:    'INR',
        name:        'Lakshmi Jewellers',
        description: 'Jewellery Order',
        order_id:    /*[[${razorpayOrderId}]]*/ '',
        prefill: {
            name:    /*[[${customerName}]]*/ '',
            contact: /*[[${customerPhone}]]*/ ''
        },
        theme: { color: '#c9a84c' },
        handler: function(response) {
            document.getElementById('rzp_order_id').value   = response.razorpay_order_id;
            document.getElementById('rzp_payment_id').value = response.razorpay_payment_id;
            document.getElementById('rzp_signature').value  = response.razorpay_signature;
            document.getElementById('rzp_method').value     = response.method || 'Razorpay';
            document.getElementById('paymentResult').submit();
        },
        modal: {
            ondismiss: function() {
                window.location.href = '/checkout';
            }
        }
    };

    const rzp = new Razorpay(options);

    // Auto-open on page load
    window.onload = function() { rzp.open(); };

    // Also open on button click
    document.getElementById('payBtn').onclick = function(e) {
        e.preventDefault();
        rzp.open();
    };
</script>
</body>
</html>
