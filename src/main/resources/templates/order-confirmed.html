<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Order Confirmed!</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lato:wght@400;600&display=swap" rel="stylesheet"/>
    <style>
        :root { --gold:#c9a84c; --dark:#1a0f00; --brown:#3a2a1a; --cream:#fdf8f0; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Lato',sans-serif; background:var(--cream); color:var(--brown); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; }
        .card { background:white; border-radius:20px; padding:40px; max-width:520px; width:100%; box-shadow:0 4px 30px rgba(0,0,0,0.1); text-align:center; }
        .check { font-size:4rem; margin-bottom:16px; animation: pop 0.5s ease; }
        @keyframes pop { 0%{transform:scale(0)} 80%{transform:scale(1.2)} 100%{transform:scale(1)} }
        h1 { font-family:'Playfair Display',serif; font-size:1.8rem; color:var(--dark); margin-bottom:8px; }
        .order-id { background:#f0fdf4; border:1px solid #86efac; color:#166534; padding:8px 20px; border-radius:20px; font-size:0.9rem; font-weight:600; display:inline-block; margin:12px 0; }
        .details { text-align:left; background:#fdf8f0; border-radius:12px; padding:20px; margin:20px 0; font-size:0.9rem; }
        .details p { padding:6px 0; border-bottom:1px solid #f0e8d0; display:flex; justify-content:space-between; }
        .details p:last-child { border:none; }
        .details span { font-weight:600; }
        .steps { display:flex; justify-content:space-between; margin:24px 0; position:relative; }
        .steps::before { content:''; position:absolute; top:18px; left:10%; right:10%; height:2px; background:#e0d0a0; z-index:0; }
        .step { display:flex; flex-direction:column; align-items:center; gap:6px; z-index:1; flex:1; }
        .step-dot { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1rem; }
        .step-dot.done { background:var(--gold); }
        .step-dot.pending { background:#e0d0a0; }
        .step span { font-size:0.72rem; color:#888; text-align:center; }
        .btn-track { display:inline-block; margin-top:8px; padding:12px 30px; background:var(--dark); color:var(--gold); border-radius:30px; text-decoration:none; font-weight:600; font-size:0.9rem; }
        .btn-home { display:inline-block; margin-top:8px; margin-left:10px; padding:12px 30px; border:2px solid var(--gold); color:var(--brown); border-radius:30px; text-decoration:none; font-size:0.9rem; }
    </style>
</head>
<body>
<div class="card">
    <div class="check">✅</div>
    <h1>Order Confirmed!</h1>
    <p style="color:#888;font-size:0.9rem;">Thank you, <strong th:text="${order.customerName}"></strong>! Your order has been placed.</p>
    <div class="order-id" th:text="${order.id}"></div>

    <div class="details">
        <p><span>Payment</span> <span th:text="${order.paymentMethod}"></span></p>
        <p><span>Status</span> <span style="color:green">✓ Paid</span></p>
        <p><span>Deliver to</span> <span th:text="${order.address}"></span></p>
        <p><span>Phone</span> <span th:text="${order.phone}"></span></p>
        <p><span>Ordered at</span> <span th:text="${order.createdAt}"></span></p>
    </div>

    <div class="steps">
        <div class="step"><div class="step-dot done">✓</div><span>Order Placed</span></div>
        <div class="step"><div class="step-dot pending">🍳</div><span>Preparing</span></div>
        <div class="step"><div class="step-dot pending">🚚</div><span>Out for Delivery</span></div>
        <div class="step"><div class="step-dot pending">🏠</div><span>Delivered</span></div>
    </div>

    <a th:href="'/track/' + ${order.id}" class="btn-track">📦 Track Order</a>
    <a href="/" class="btn-home">🏠 Back to Shop</a>
</div>
</body>
</html>
